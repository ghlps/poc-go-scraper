services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    volumes:
      - ./dynamodb-data:/home/dynamodblocal/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  dynamodb-setup:
    image: amazon/aws-cli
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      aws dynamodb create-table
        --table-name scraper_menu_executions
        --attribute-definitions
          AttributeName=execution_id,AttributeType=S
          AttributeName=restaurant_code,AttributeType=S
          AttributeName=menu_date,AttributeType=S
        --key-schema
          AttributeName=execution_id,KeyType=HASH
        --billing-mode PAY_PER_REQUEST
        --global-secondary-indexes
          '[
            {
              "IndexName":"restaurant-code-date-index",
              "KeySchema":[
                {"AttributeName":"restaurant_code","KeyType":"HASH"},
                {"AttributeName":"menu_date","KeyType":"RANGE"}
              ],
              "Projection":{"ProjectionType":"ALL"}
            }
          ]'
        --endpoint-url http://dynamodb-local:8000

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
